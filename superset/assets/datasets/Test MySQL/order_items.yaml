metrics:
- metric_name: count
  verbose_name: Line Items
  metric_type: count
  expression: COUNT(*)
- metric_name: units_sold
  verbose_name: Units Sold
  metric_type: sum
  expression: SUM(quantity)
- metric_name: gross_revenue
  verbose_name: Gross Revenue
  metric_type: sum
  expression: SUM(unit_price * quantity - discount_amount)
  d3format: ',.2f'
- metric_name: gross_margin
  verbose_name: Gross Margin
  metric_type: sum
  expression: SUM((unit_price - unit_cost) * quantity - discount_amount)
  d3format: ',.2f'
